name: Build GHCR Build/Test Container

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push the built image to GHCR"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master
      - main
    paths:
      - docker/build-test-container/**
      - .github/workflows/ghcr-build-test-container.yml
  pull_request:
    paths:
      - docker/build-test-container/**
      - .github/workflows/ghcr-build-test-container.yml

jobs:
  build-test-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/emmtrix/agent-test-build-test
      LOCAL_IMAGE_NAME: agent-test-build-test:ci
      SHOULD_PUSH: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Collect container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build image for smoke tests
        uses: docker/build-push-action@v6
        with:
          context: docker/build-test-container
          file: docker/build-test-container/Dockerfile
          load: true
          push: false
          tags: ${{ env.LOCAL_IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm "${LOCAL_IMAGE_NAME}" bash -lc '
            set -e
            bc --version
            cmake --version
            file --version
            gcc --version
            git --version
            jq --version
            ninja --version
            clang-format --version
            python3 --version
            python --version
            php --version
            php -m | grep -Fx mbstring >/dev/null
            rsync --version
            shellcheck --version
            ssh -V
            sudo --version
            unzip -v
            valgrind --version
            xmllint --version
            zip -v
            zstd --version
            git lfs version
          '
          docker run --rm "${LOCAL_IMAGE_NAME}" sh -lc '
            set -o pipefail
          '

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: env.SHOULD_PUSH == 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker/build-test-container
          file: docker/build-test-container/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
