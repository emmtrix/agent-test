name: Container Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - .github/workflows/container-smoke.yml
      - docker/build-test-container/**
      - .github/workflows/ghcr-build-test-container.yml

jobs:
  smoke:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/emmtrix/agent-test-build-test:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Emit normal Actions logs
        run: |
          echo "hello from container-smoke"
          echo "runner=$(uname -a)"
          echo "user=$(id)"
          echo "pwd=$(pwd)"
          echo "workspace=$GITHUB_WORKSPACE"
          ls -la
