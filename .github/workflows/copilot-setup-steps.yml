name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job must be called copilot-setup-steps for Copilot to detect it.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: ghcr.io/emmtrix/llvm-cpp2c-build-test:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # Copilot's helper scripts still resolve through host-style
      # /home/runner/_work/_temp/... paths even when a job container is active.
      # Keep the bind mount narrow so the container does not shadow the rest of
      # /home/runner while we test whether session-log streaming returns.
      options: --volume /home/runner/_work:/home/runner/_work

    # Set minimal permissions for setup steps.
    # Copilot Agent receives its own token with appropriate permissions.
    permissions:
      contents: read
      packages: read
              
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show container environment
        run: |
          echo "hello from copilot-setup-steps"
          echo "runner=$(uname -a)"
          echo "user=$(id)"
          echo "pwd=$(pwd)"
          echo "workspace=$GITHUB_WORKSPACE"
          ls -la
